# Quota Monitoring Workflow
#
# Runs daily at 9 AM EST and after every deployment
# Checks Upstash, Supabase, and alerts if quotas are high
#
# Setup required:
# 1. Add secrets in GitHub: Settings > Secrets and Variables > Actions
#    - UPSTASH_REDIS_REST_URL
#    - UPSTASH_REDIS_REST_TOKEN
#    - SUPABASE_URL
#    - SUPABASE_SERVICE_KEY
#    - ALERT_WEBHOOK (Slack/Discord webhook URL)
# 2. Enable workflow: Actions > Quota Monitor > Enable workflow

name: Quota Monitor

on:
  # Run daily at 9 AM EST (2 PM UTC)
  schedule:
    - cron: '0 14 * * *'

  # Run after deployments
  workflow_run:
    workflows: ["Deploy to Render"]
    types: [completed]

  # Manual trigger
  workflow_dispatch:

jobs:
  check-quotas:
    name: Check Service Quotas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts/monitoring
          npm init -y
          npm install dotenv @supabase/supabase-js

      - name: Check Upstash Quota
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          ALERT_WEBHOOK: ${{ secrets.ALERT_WEBHOOK }}
        run: |
          cd scripts/monitoring
          npx tsx check-upstash-quota.ts || echo "Upstash check failed"

      - name: Check Supabase Quota
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ALERT_WEBHOOK: ${{ secrets.ALERT_WEBHOOK }}
        run: |
          cd scripts/monitoring
          npx tsx check-supabase-quota.ts || echo "Supabase check failed"

      - name: Summary
        run: |
          echo "✅ Quota check complete"
          echo "Check logs above for any alerts"

# Jalanea Works Cloud Agent - Docker Compose
# For local development and testing

version: '3.8'

services:
  # ============================================
  # API Server
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HEADLESS=true
      # Vision & AI
      - VISION_PROVIDER=${VISION_PROVIDER:-claude}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # CAPTCHA
      - CAPSOLVER_API_KEY=${CAPSOLVER_API_KEY}
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      # Redis
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
    volumes:
      - sessions:/app/sessions
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================
  # Job Queue Worker
  # ============================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/queue/worker.js"]
    environment:
      - NODE_ENV=production
      - HEADLESS=true
      - BROWSER_TYPE=${BROWSER_TYPE:-camoufox}
      - MAX_ACTIONS=${MAX_ACTIONS:-50}
      # Vision & AI
      - VISION_PROVIDER=${VISION_PROVIDER:-claude}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # CAPTCHA
      - CAPSOLVER_API_KEY=${CAPSOLVER_API_KEY}
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      # Redis
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
    volumes:
      - sessions:/app/sessions
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

volumes:
  sessions:
    driver: local

          backgroundSize: {

          keyframes: {

              '100%': { backgroundPosition: '200% 50%' },

            'float': {

              '50%': { transform: 'translateY(-20px) rotate(2deg)' },

            'glow-pulse': {
              '0%, 100%': { textShadow: '0 0 20px rgba(255, 196, 37, 0.3)' },
              '50%': { textShadow: '0 0 40px rgba(255, 196, 37, 0.6), 0 0 60px rgba(255, 196, 37, 0.3)' },
            },
            'reveal': {
              '0%': { opacity: '0', transform: 'translateY(30px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'live-pulse': {
              '0%, 100%': { opacity: '1', transform: 'scale(1)' },
              '50%': { opacity: '0.5', transform: 'scale(1.5)' },
            },
            'border-glow': {
              '0%, 100%': { borderColor: 'rgba(255, 196, 37, 0.2)' },
              '50%': { borderColor: 'rgba(255, 196, 37, 0.5)' },
            },
          },
          animation: {
            'text-flow': 'flow 3s linear infinite',
            'float': 'float 6s ease-in-out infinite',

            'reveal': 'reveal 0.8s ease-out forwards',

  <style>
    /* Base Styles */
    body {
      background-color: #020617;
      color: #f8fafc;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Safe area support for notched devices */
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* Prevent text selection on mobile for app-like feel */
    .no-select {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    /* Smooth touch scrolling */
    .smooth-scroll {
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    /* Mobile-optimized touch targets */
    @media (max-width: 768px) {
      button, a, input, select, textarea {
        min-height: 44px;
      }

      /* Larger tap targets for mobile */
      .tap-target {
        min-width: 44px;
        min-height: 44px;
      }

      /* Hide browser UI elements when in standalone mode */
      @media (display-mode: standalone) {
        .browser-only {
          display: none !important;
        }
      }

      /* Prevent pull-to-refresh on mobile */
      html {
        overscroll-behavior-y: contain;
      }

      /* Fix for iOS input zoom */
      input, select, textarea {
        font-size: 16px !important;
      }
    }

    /* Active states for touch feedback */
    .touch-active:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    /* Bottom navigation safe area */
    .pb-safe {
      padding-bottom: calc(1rem + env(safe-area-inset-bottom));
    }

    /* Full screen modal safe area */
    .modal-safe {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Standalone mode adjustments */
    @media (display-mode: standalone) {
      body {
        padding-top: env(safe-area-inset-top);
      }
    }

    /* Glassmorphism Utilities */
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .glass-panel-dark {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.95));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    }

    /* Enhanced Glass Card - Superdesign Style */
    .glass-card {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.95));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1rem;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .glass-card:hover {
      border-color: rgba(255, 196, 37, 0.3);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(255, 196, 37, 0.1);
      transform: translateY(-4px);
    }

    /* Gold Text Glow */
    .text-glow {
      text-shadow: 0 0 30px rgba(255, 196, 37, 0.4);
    }

    .text-glow-intense {
      text-shadow: 0 0 40px rgba(255, 196, 37, 0.6), 0 0 80px rgba(255, 196, 37, 0.3);
    }

    /* Button Glow Effects */
    .btn-glow {
      box-shadow: 0 0 30px rgba(255, 196, 37, 0.3);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-glow:hover {
      box-shadow: 0 0 50px rgba(255, 196, 37, 0.5), 0 0 100px rgba(255, 196, 37, 0.2);
      transform: translateY(-2px) scale(1.02);
    }

    /* Staggered Reveal Delays */
    .reveal-1 { animation-delay: 0.1s; }
    .reveal-2 { animation-delay: 0.2s; }
    .reveal-3 { animation-delay: 0.3s; }
    .reveal-4 { animation-delay: 0.4s; }
    .reveal-5 { animation-delay: 0.5s; }

    /* Gradient Text */
    .gradient-text {
      background: linear-gradient(135deg, #FFC425 0%, #FFD768 50%, #FFFFFF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Animated Border */
    .animated-border {
      position: relative;
    }

    .animated-border::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, rgba(255, 196, 37, 0.3), transparent, rgba(255, 196, 37, 0.3));
      border-radius: inherit;
      z-index: -1;
      animation: border-glow 3s ease-in-out infinite;
    }

    /* Focus Utilities */
    .focus-ring {
      transition: all 0.2s ease;
    }

    .focus-ring:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(255, 196, 37, 0.4);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Hide scrollbar for horizontal scroll on mobile */
    .scrollbar-hide {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
      /* Chrome, Safari, Opera */
    }
  </style>

<body class="font-sans antialiased selection:bg-gold-light selection:text-jalanea-900 min-h-screen" style="background-color: #020617;">
  <!-- Instant splash screen - shows before React loads -->
  <div id="splash" style="
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: linear-gradient(135deg, #0f172a 0%, #020617 50%, #0f172a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.3s ease;
  ">
    <div style="
      width: 80px;
      height: 80px;
      border-radius: 16px;
      background: linear-gradient(135deg, #FFC425 0%, #FFD768 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(255, 196, 37, 0.4);
      animation: pulse 2s ease-in-out infinite;
    ">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
      </svg>
    </div>
    <h1 style="
      color: white;
      font-size: 24px;
      font-weight: 700;
      margin-top: 24px;
      font-family: 'Space Grotesk', sans-serif;
    ">Jalanea<span style="color: #FFC425;">Works</span></h1>
    <p style="color: #64748b; font-size: 14px; margin-top: 4px;">Career Launchpad</p>
  </div>

  <style>
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 196, 37, 0.3); }
      50% { box-shadow: 0 0 40px rgba(255, 196, 37, 0.6); }
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }

    /* Hide splash on desktop (768px+) */
    @media (min-width: 768px) {
      #splash { display: none !important; }
    }
  </style>

  <div id="root"></div>

  <!-- Hide splash when React is ready or after timeout -->
  <script>
    (function() {
      var splash = document.getElementById('splash');
      if (!splash) return;

      // Auto-hide after 1.5 seconds (gives React time to render)
      setTimeout(function() {
        if (splash && splash.parentNode) {
          splash.classList.add('fade-out');
          setTimeout(function() {
            if (splash && splash.parentNode) splash.remove();
          }, 300);
        }
      }, 1500);

      // Also expose for manual hiding if needed
      window.hideSplash = function() {
        if (splash && splash.parentNode) {
          splash.classList.add('fade-out');
          setTimeout(function() {
            if (splash && splash.parentNode) splash.remove();
          }, 300);
        }
      };
    })();
  </script>

  <!-- Eruda Mobile Console (for debugging) -->
  <script>
    // Load Eruda only when ?debug=true is in URL (dev only)
    (function() {
      var hasDebugFlag = window.location.search.includes('debug=true');
      if (hasDebugFlag) {
        var script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/eruda';
        document.body.appendChild(script);
        script.onload = function() {
          eruda.init();
          console.log('[Debug] Eruda mobile console initialized');
        };
      }
    })();
  </script>

  <!-- Service Worker Registration -->
  <script>
    // Register service worker for PWA functionality
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(function(registration) {
            console.log('[PWA] Service Worker registered:', registration.scope);

            // Check for updates periodically
            setInterval(function() {
              registration.update();
            }, 60 * 60 * 1000); // Every hour

            // Handle updates
            registration.addEventListener('updatefound', function() {
              var newWorker = registration.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New version available
                    console.log('[PWA] New version available');
                    // The PWAProvider component will handle showing update UI
                    window.dispatchEvent(new CustomEvent('swUpdate', { detail: registration }));
                  }
                });
              }
            });
          })
          .catch(function(error) {
            console.error('[PWA] Service Worker registration failed:', error);
          });

        // Handle controller change
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (refreshing) return;
          refreshing = true;
          console.log('[PWA] Controller changed, page will reload');
        });
      });
    }

    // Handle online/offline status
    window.addEventListener('online', function() {
      console.log('[PWA] Back online');
      document.body.classList.remove('offline');
    });

    window.addEventListener('offline', function() {
      console.log('[PWA] Gone offline');
      document.body.classList.add('offline');
    });

    // Initialize offline status
    if (!navigator.onLine) {
      document.body.classList.add('offline');
    }
  </script>

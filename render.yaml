# Jalanea Works Cloud Agent - Render Blueprint
# Deploy with: https://render.com/deploy
#
# Single API server handles everything:
# - REST API endpoints
# - WebSocket connections
# - Live Browser streaming
#
# Cost: $7/month (Starter plan for browser automation)

services:
  # ============================================
  # API Server (Starter - $7/mo)
  # Handles HTTP, WebSocket, and browser streaming
  # ============================================
  - type: web
    name: jalanea-api
    runtime: docker
    rootDir: ./cloud-agent
    dockerfilePath: ./Dockerfile
    dockerCommand: node dist/index.js
    plan: starter  # $7/mo - needed for browser automation
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: HEADLESS
        value: "true"
      - key: BROWSER_TYPE
        value: camoufox
      # Vision & AI
      - key: VISION_PROVIDER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # CAPTCHA
      - key: CAPSOLVER_API_KEY
        sync: false
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Credential Encryption
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      # Redis (Upstash)
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # Stripe (Payments)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Notifications
      - key: RESEND_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

  # ============================================
  # Job Queue Worker (Starter Plan - $7/mo)
  # Processes job applications in the background
  # ============================================
  - type: worker
    name: jalanea-worker
    runtime: docker
    rootDir: ./cloud-agent
    dockerfilePath: ./Dockerfile
    dockerCommand: node dist/queue/worker.js
    plan: starter  # Needs always-on for queue processing
    envVars:
      - key: NODE_ENV
        value: production
      - key: HEADLESS
        value: "true"
      - key: BROWSER_TYPE
        value: camoufox
      - key: MAX_ACTIONS
        value: "50"
      # Vision & AI
      - key: VISION_PROVIDER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # CAPTCHA
      - key: CAPSOLVER_API_KEY
        sync: false
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Credential Encryption
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      # Redis (Upstash)
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # Notifications (worker sends notifications when jobs complete)
      - key: RESEND_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

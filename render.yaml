# Jalanea Works Cloud Agent - Render Blueprint
# Deploy with: https://render.com/deploy
#
# jalanea-worker ($7/mo Starter) - Main API with browser automation
# jalanea-api (Free) - Lightweight backup/redirect
#
# Cost: $7/month total

services:
  # ============================================
  # Main API Server (Starter - $7/mo)
  # Handles HTTP, WebSocket, and browser streaming
  # This is the PAID service with browser automation
  # ============================================
  - type: web
    name: jalanea-worker
    runtime: docker
    rootDir: ./cloud-agent
    dockerfilePath: ./Dockerfile
    dockerCommand: node dist/index.js
    plan: starter  # $7/mo - needed for browser automation
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: HEADLESS
        value: "true"
      - key: BROWSER_TYPE
        value: camoufox
      # Vision & AI
      - key: VISION_PROVIDER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # CAPTCHA
      - key: CAPSOLVER_API_KEY
        sync: false
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Credential Encryption
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      # Redis (Upstash)
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # Stripe (Payments)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Notifications
      - key: RESEND_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

  # ============================================
  # Backup API Server (Free tier)
  # Lightweight fallback - can be removed if not needed
  # ============================================
  - type: web
    name: jalanea-api
    runtime: docker
    rootDir: ./cloud-agent
    dockerfilePath: ./Dockerfile
    dockerCommand: node dist/index.js
    plan: free  # Free tier - limited resources
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: HEADLESS
        value: "true"
      - key: BROWSER_TYPE
        value: camoufox
      # Vision & AI
      - key: VISION_PROVIDER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # CAPTCHA
      - key: CAPSOLVER_API_KEY
        sync: false
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Credential Encryption
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      # Redis (Upstash)
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # Stripe (Payments)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Notifications
      - key: RESEND_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
